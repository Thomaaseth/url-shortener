<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <title>URL Shortener</title>
</head>
<body>
    <h1>URL Shortener</h1>
    <form id="urlForm" action="" method="POST" class="form-example">
        <div class="form-example">
          <label for="longUrl">Enter url&nbsp;: </label>
          <input type="text" name="url" id="url" required />
        </div>
        <div class="form-example">
          <input id="shorten" type="submit" value="Get short url" />
        </div>
        <div class="form-example">
            <input id="getStats" type="submit" value="Get stats count" />
        </div>
      </form>
      <script>
        document.getElementById('urlForm').addEventListener('submit', async function(event) {
            event.preventDefault()
            document.getElementById('result').textContent = ''
            document.getElementById('error').textContent = ''
            if (event.submitter.id === "shorten") {
            const formData = new FormData(urlForm) 
                try {
                    const response = await fetch('/url', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ "url": formData.get("url")}),
                })
                if (!response.ok) {
                        const result = await response.json()
                        console.log(`Status code: ${response.status}`)
                        throw new Error(`Error: ${result.message}`)                
                }
                const result = await response.json()
                console.log(result)
                document.getElementById('result').textContent = `Short url: ${result['Shortened url']}`
                } catch (error) {
                    console.error(error.message)
                    document.getElementById('error').textContent = error.message
                }
            } else {
                const formData = new FormData(urlForm) 
                const url = formData.get("url")
                let shortCode
                if (url.endsWith('/')) {
                    shortCode = url.slice(0, -1).split('/')
                } else {
                    shortCode = url.split('/')
                }
                console.log(shortCode)
                try {
                    const response = await fetch(`/url/shortened/${shortCode[3]}/stats`, {
                        headers: {
                            "Content-Type": "application/json"
                        },
                    })
                    if (!response.ok) {
                        const result = await response.json()
                        console.log(`Status code: ${response.status}`)
                        throw new Error(`Error: ${result.message}`)
                    }
                    const result = await response.json()
                    document.getElementById('result').textContent = result.urlObject[0].count
                    console.log(result)
                } catch (error) {
                    console.error(error.message)
                    document.getElementById('error').textContent = error.message
                }
            }
            }
        )
      </script> 
      <div id="result" class="form-example"></div>     
      <div id="error" class="error"></div>
</body>
</html>
